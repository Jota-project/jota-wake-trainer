# .github/workflows/test.yml
#
# Nombre y disparadores alineados con STANDARDS.md de Jota-project
# (https://github.com/Jota-project/.github/blob/main/STANDARDS.md). Dos
# adaptaciones deliberadas frente a la plantilla del org, ambas decididas
# explícitamente en vez de copiadas sin más:
#   - Este repo no separa tests/unit/ de tests/integration/ (es un CLI de
#     entrenamiento, no un servicio con esa distinción natural) — se corre
#     tests/ tal cual está.
#   - El paso de ruff no bloquea el build todavía (--exit-zero): el código
#     existente no se ha limpiado aún contra sus reglas. Ver issue
#     "Adoptar ruff en serio (arreglar avisos + CI bloqueante)".
name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # sounddevice (dependencia base, ver pyproject.toml) necesita la
      # librería nativa PortAudio en tiempo de import, no solo en tiempo de
      # ejecución — sin esto, "import sounddevice" lanza
      # "OSError: PortAudio library not found" y pytest aborta la
      # recolección de tests/test_recorder.py y
      # tests/test_workflows_recording.py con exit code 2, tumbando toda la
      # suite aunque el resto de tests no toquen audio para nada.
      - name: Instalar PortAudio (requerido por sounddevice)
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Lint (ruff, no bloqueante por ahora)
        run: ruff check . --exit-zero

      - name: Tests
        run: pytest tests/ -q
