# .github/workflows/tests.yml
#
# OBSOLETO — sustituido por .github/workflows/test.yml (nombre alineado con
# STANDARDS.md de Jota-project). Este fichero no se pudo borrar desde el
# entorno donde se hizo el cambio por una restricción del propio mount de
# archivos (falla el unlink incluso para "rm"/"mv" a nivel de sistema
# operativo, no es cosa de git). Bórralo tú con normalidad:
#
#   git rm .github/workflows/tests.yml
#   git commit -m "chore: elimina workflow de tests duplicado (ver test.yml)"
#   git push
#
# Mientras tanto, "on: workflow_dispatch" evita que corra automáticamente
# en cada push/PR (solo se podría lanzar a mano desde la pestaña Actions),
# así que no compite ni duplica al workflow real.
name: "Tests (OBSOLETO - borrar, ver test.yml)"

on:
  workflow_dispatch:

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Este workflow esta obsoleto. Borralo - ver comentario al inicio del fichero."
