# .github/workflows/tests.yml
name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # sounddevice (dependencia base, ver pyproject.toml) necesita la
      # librería nativa PortAudio en tiempo de import, no solo en tiempo de
      # ejecución — sin esto, "import sounddevice" lanza
      # "OSError: PortAudio library not found" y pytest aborta la
      # recolección de tests/test_recorder.py y
      # tests/test_workflows_recording.py con exit code 2, tumbando toda la
      # suite aunque el resto de tests no toquen audio para nada.
      - name: Instalar PortAudio (requerido por sounddevice)
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Ejecutar tests
        run: pytest tests/ -q
